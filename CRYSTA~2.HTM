<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>크리스탈 아일랜드 — 전투 업데이트</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif; touch-action:none; }
  canvas { display:block; }
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  .panel { position:absolute; background:rgba(10,20,35,.55); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.15); border-radius:14px; color:#fff; padding:9px 15px; }
  #statPanel { top:14px; left:14px; font-size:17px; font-weight:700; letter-spacing:.5px; line-height:1.55; }
  #hpOuter { width:170px; height:14px; background:rgba(0,0,0,.5); border-radius:8px; margin-top:5px; overflow:hidden; border:1px solid rgba(255,255,255,.2); }
  #hpFill { width:100%; height:100%; background:linear-gradient(90deg,#4be04b,#8aff6a); border-radius:8px; transition:width .2s; }
  #clock { top:14px; right:14px; font-size:16px; text-align:right; }
  #fps { position:absolute; bottom:10px; right:14px; color:rgba(255,255,255,.5); font-size:11px; }
  #hint { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.85); font-size:13px; background:rgba(10,20,35,.45); padding:8px 18px; border-radius:20px; transition:opacity 2s; white-space:nowrap; }
  #toast { position:absolute; top:84px; left:50%; transform:translateX(-50%); color:#ffe89a; font-size:21px; font-weight:700; text-shadow:0 2px 8px rgba(0,0,0,.6); opacity:0; transition:opacity .4s; white-space:nowrap; }
  #vig { position:fixed; inset:0; pointer-events:none; z-index:12; box-shadow:inset 0 0 140px 50px rgba(255,20,20,.75); opacity:0; transition:opacity .5s; }
  #overlay { position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center; background:radial-gradient(ellipse at 50% 30%, #16324f 0%, #060d18 75%); color:#fff; text-align:center; padding:24px; }
  #overlay h1 { font-size:min(10vw,54px); font-weight:800; background:linear-gradient(90deg,#7fd8ff,#c9a7ff,#ffd77f); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:10px; }
  #overlay p { color:#a8c3dd; font-size:14px; line-height:1.85; max-width:560px; margin-bottom:24px; }
  #startBtn { pointer-events:auto; font-size:20px; font-weight:700; color:#06121f; background:linear-gradient(90deg,#7fd8ff,#a9e8ff); border:none; border-radius:30px; padding:15px 52px; cursor:pointer; box-shadow:0 0 30px rgba(127,216,255,.45); transition:transform .15s; }
  #startBtn:active { transform:scale(.95); }
  .bigMsg { position:fixed; inset:0; z-index:25; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(4,10,20,.75); color:#fff; text-align:center; }
  .bigMsg h2 { font-size:min(9vw,44px); margin-bottom:12px; }
  #winOverlay h2 { color:#ffe89a; text-shadow:0 0 24px rgba(255,215,120,.6); }
  #deathOverlay h2 { color:#ff6b5c; text-shadow:0 0 24px rgba(255,80,60,.6); }
  .bigMsg p { color:#cfe3f5; font-size:17px; }
  /* touch controls */
  #joyBase { position:fixed; left:26px; bottom:32px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.25); display:none; z-index:15; }
  #joyStick { position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border-radius:50%; background:rgba(255,255,255,.35); }
  .ctlBtn { position:fixed; border-radius:50%; color:#fff; font-weight:700; display:none; z-index:15; border:2px solid rgba(255,255,255,.4); }
  #atkBtn { right:24px; bottom:96px; width:92px; height:92px; font-size:38px; background:rgba(255,120,90,.28); border-color:rgba(255,140,100,.6); }
  #blkBtn { right:128px; bottom:44px; width:70px; height:70px; font-size:28px; background:rgba(120,170,255,.25); border-color:rgba(140,180,255,.55); }
  #jumpBtn { right:34px; bottom:22px; width:64px; height:64px; font-size:13px; background:rgba(127,216,255,.22); border-color:rgba(127,216,255,.55); }
</style>
</head>
<body>
<div id="hud">
  <div id="statPanel" class="panel">
    <div id="crystalCount">💎 0 / 20</div>
    <div id="killCount" style="font-size:14px;color:#ffb3a0;">⚔️ 처치 0</div>
    <div id="hpOuter"><div id="hpFill"></div></div>
  </div>
  <div id="clock" class="panel">🌅 아침</div>
  <div id="hint">WASD 이동 · 좌클릭 공격 · 우클릭(홀드) 방패 · Space 점프 · Shift 달리기</div>
  <div id="toast"></div>
  <div id="fps"></div>
</div>
<div id="vig"></div>
<div id="joyBase"><div id="joyStick"></div></div>
<button id="atkBtn" class="ctlBtn">⚔️</button>
<button id="blkBtn" class="ctlBtn">🛡️</button>
<button id="jumpBtn" class="ctlBtn">점프</button>
<div id="winOverlay" class="bigMsg"><h2>🎉 모든 수정을 모았습니다!</h2><p id="winTime"></p></div>
<div id="deathOverlay" class="bigMsg"><h2>💀 쓰러졌습니다…</h2><p>잠시 후 부활합니다</p></div>
<div id="overlay">
  <h1>크리스탈 아일랜드</h1>
  <p><b style="color:#ffb3a0">⚔️ 전투 업데이트</b><br>
  섬 곳곳의 <b style="color:#8aff8a">슬라임</b>과 <b style="color:#ccc">돌 골렘</b>이 수정을 지키고 있습니다.<br>
  검과 방패로 맞서 싸우며 <b style="color:#c9a7ff">수정 20개</b>를 모두 모으세요!<br><br>
  🖥️ WASD 이동 · 좌클릭 공격 · 우클릭 방패 · Space 점프<br>
  📱 왼쪽 조이스틱 · ⚔️ 공격 · 🛡️ 방패(홀드) · 점프 버튼</p>
  <button id="startBtn">모험 시작</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* ================= 기본 설정 ================= */
const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const WORLD = 760, WATER_Y = 0, DAY_LENGTH = 200;
const renderer = new THREE.WebGLRenderer({ antialias:!IS_TOUCH, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, IS_TOUCH ? 1.5 : 2));
renderer.shadowMap.enabled = !IS_TOUCH;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x88bbee, 120, 620);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2600);

/* ================= 노이즈 & 지형 ================= */
function hash(x, y){ const n = Math.sin(x*127.1 + y*311.7) * 43758.5453; return n - Math.floor(n); }
function noise2(x, y){
  const xi = Math.floor(x), yi = Math.floor(y), xf = x-xi, yf = y-yi;
  const u = xf*xf*(3-2*xf), v = yf*yf*(3-2*yf);
  const a = hash(xi,yi), b = hash(xi+1,yi), c = hash(xi,yi+1), d = hash(xi+1,yi+1);
  return a + (b-a)*u + (c-a)*v + (a-b-c+d)*u*v;
}
function fbm(x, y){
  let s=0, amp=1, f=0.006, norm=0;
  for(let i=0;i<5;i++){ s += amp*noise2(x*f, y*f); norm += amp; amp *= 0.5; f *= 2.15; }
  return s/norm;
}
function terrainH(x, z){
  const d = Math.sqrt(x*x + z*z) / (WORLD*0.52);
  const falloff = Math.max(0, 1 - d*d);
  const e = fbm(x, z);
  let h = Math.pow(e, 1.6) * 92 * falloff - 5.5;
  h += noise2(x*0.05+40, z*0.05+40) * 1.6;
  return h;
}

const SEG = IS_TOUCH ? 150 : 190;
const tGeo = new THREE.PlaneGeometry(WORLD, WORLD, SEG, SEG);
tGeo.rotateX(-Math.PI/2);
{
  const pos = tGeo.attributes.position;
  for(let i=0;i<pos.count;i++) pos.setY(i, terrainH(pos.getX(i), pos.getZ(i)));
  tGeo.computeVertexNormals();
  const colors = new Float32Array(pos.count*3);
  const nrm = tGeo.attributes.normal;
  const cSand=new THREE.Color(0xd9c78a), cGrass1=new THREE.Color(0x55a84b), cGrass2=new THREE.Color(0x2f7a38),
        cRock=new THREE.Color(0x8a8578), cSnow=new THREE.Color(0xf4f7fa), tmp=new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const h = pos.getY(i), slope = 1 - nrm.getY(i);
    if(h < 1.6) tmp.copy(cSand);
    else if(h > 40) tmp.copy(cSnow);
    else tmp.copy(cGrass1).lerp(cGrass2, Math.min(1, h/34));
    if(slope > 0.28 && h >= 1.6) tmp.lerp(cRock, Math.min(1, (slope-0.28)*3.2));
    const jitter = 0.94 + hash(i, 7)*0.1;
    colors[i*3]=tmp.r*jitter; colors[i*3+1]=tmp.g*jitter; colors[i*3+2]=tmp.b*jitter;
  }
  tGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
}
const terrain = new THREE.Mesh(tGeo, new THREE.MeshLambertMaterial({ vertexColors:true }));
terrain.receiveShadow = true;
scene.add(terrain);

/* ================= 물 ================= */
const water = new THREE.Mesh(
  new THREE.PlaneGeometry(WORLD*3, WORLD*3, 60, 60).rotateX(-Math.PI/2),
  new THREE.MeshPhongMaterial({ color:0x2277bb, transparent:true, opacity:0.78, shininess:140, specular:0xaaddff })
);
water.position.y = WATER_Y;
scene.add(water);
const waterPos = water.geometry.attributes.position;
const waterBase = waterPos.array.slice();

/* ================= 조명 & 하늘 ================= */
const hemi = new THREE.HemisphereLight(0xbfe3ff, 0x4a5f3a, 0.6); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff4e0, 1.0); scene.add(sun); scene.add(sun.target);
if(!IS_TOUCH){
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  const sc = sun.shadow.camera; sc.left=-130; sc.right=130; sc.top=130; sc.bottom=-130; sc.far=800;
  sun.shadow.bias = -0.0005;
}
const moon = new THREE.DirectionalLight(0x8fa8ff, 0.0); scene.add(moon); scene.add(moon.target);

function makeGlowTexture(inner, outer){
  const c = document.createElement('canvas'); c.width=c.height=128;
  const g = c.getContext('2d'), grad = g.createRadialGradient(64,64,4,64,64,64);
  grad.addColorStop(0, inner); grad.addColorStop(0.35, outer); grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:makeGlowTexture('rgba(255,250,220,1)','rgba(255,200,90,0.6)'), transparent:true, depthWrite:false, fog:false }));
sunSprite.scale.set(160,160,1); scene.add(sunSprite);
const moonSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:makeGlowTexture('rgba(230,240,255,1)','rgba(160,190,255,0.4)'), transparent:true, depthWrite:false, fog:false }));
moonSprite.scale.set(90,90,1); scene.add(moonSprite);

const starGeo = new THREE.BufferGeometry();
{
  const n=900, arr=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const t=Math.random()*Math.PI*2, p=Math.acos(Math.random()*0.9), r=1600;
    arr[i*3]=r*Math.sin(p)*Math.cos(t); arr[i*3+1]=r*Math.cos(p); arr[i*3+2]=r*Math.sin(p)*Math.sin(t);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(arr,3));
}
const starMat = new THREE.PointsMaterial({ color:0xffffff, size:2.4, sizeAttenuation:false, transparent:true, opacity:0, fog:false });
scene.add(new THREE.Points(starGeo, starMat));

const cloudTex = makeGlowTexture('rgba(255,255,255,0.9)','rgba(255,255,255,0.35)');
const clouds = [];
for(let i=0;i<16;i++){
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map:cloudTex, transparent:true, opacity:0.5, depthWrite:false }));
  const w = 90+Math.random()*160;
  s.scale.set(w, w*0.38, 1);
  s.position.set((Math.random()-0.5)*WORLD*1.6, 120+Math.random()*70, (Math.random()-0.5)*WORLD*1.6);
  s.userData.v = 1.2+Math.random()*2;
  scene.add(s); clouds.push(s);
}

/* ================= 식생 (인스턴싱) ================= */
function scatter(count, minH, maxH, maxSlope){
  const pts=[]; let guard=0;
  while(pts.length<count && guard++<count*40){
    const x=(Math.random()-0.5)*WORLD*0.9, z=(Math.random()-0.5)*WORLD*0.9, h=terrainH(x,z);
    if(h<minH||h>maxH) continue;
    const s=Math.abs(terrainH(x+2,z)-h)+Math.abs(terrainH(x,z+2)-h);
    if(s>maxSlope) continue;
    pts.push({x,z,h});
  }
  return pts;
}
const dummy = new THREE.Object3D();
/* 나무 2종: 침엽수 + 활엽수 */
const TREE_N = IS_TOUCH ? 160 : 250;
const treePts = scatter(TREE_N, 2.2, 34, 1.5);
const pinePts = treePts.filter((_,i)=>i%5<3), oakPts = treePts.filter((_,i)=>i%5>=3);
const trunkMat = new THREE.MeshLambertMaterial({ color:0x6b4a2f });
const trunkMesh = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.35,0.55,4,6), trunkMat, treePts.length);
treePts.forEach((p,i)=>{
  const sc = 0.8+hash(i,3)*0.9;
  dummy.rotation.set(0, hash(i,5)*6.28, 0);
  dummy.position.set(p.x, p.h+2*sc, p.z); dummy.scale.setScalar(sc);
  dummy.updateMatrix(); trunkMesh.setMatrixAt(i, dummy.matrix);
});
const pineMesh = new THREE.InstancedMesh(new THREE.ConeGeometry(2.6,7,7), new THREE.MeshLambertMaterial({ color:0x2d6e33 }), pinePts.length);
pinePts.forEach((p,i)=>{
  const sc = 0.8+hash(i,13)*0.9;
  dummy.rotation.set(0, hash(i,5)*6.28, 0);
  dummy.position.set(p.x, p.h+6.5*sc, p.z); dummy.scale.setScalar(sc);
  dummy.updateMatrix(); pineMesh.setMatrixAt(i, dummy.matrix);
});
const oakMesh = new THREE.InstancedMesh(new THREE.SphereGeometry(2.8,8,7), new THREE.MeshLambertMaterial({ color:0x4d8f3a }), oakPts.length);
oakPts.forEach((p,i)=>{
  const sc = 0.8+hash(i,17)*0.8;
  dummy.rotation.set(0, 0, 0);
  dummy.position.set(p.x, p.h+5.4*sc, p.z);
  dummy.scale.set(sc*(0.9+hash(i,19)*0.4), sc*0.85, sc);
  dummy.updateMatrix(); oakMesh.setMatrixAt(i, dummy.matrix);
});
trunkMesh.castShadow = pineMesh.castShadow = oakMesh.castShadow = !IS_TOUCH;
scene.add(trunkMesh, pineMesh, oakMesh);

const rockPts = scatter(70, 1.0, 60, 3);
const rockMesh = new THREE.InstancedMesh(new THREE.DodecahedronGeometry(1.3,0), new THREE.MeshLambertMaterial({ color:0x9a958a }), rockPts.length);
rockPts.forEach((p,i)=>{
  dummy.position.set(p.x, p.h+0.4, p.z);
  dummy.scale.set(0.6+hash(i,9)*2.2, 0.5+hash(i,11)*1.4, 0.6+hash(i,13)*2.2);
  dummy.rotation.set(hash(i,1)*3, hash(i,2)*6, hash(i,4)*3);
  dummy.updateMatrix(); rockMesh.setMatrixAt(i, dummy.matrix);
});
rockMesh.castShadow = !IS_TOUCH;
scene.add(rockMesh);

/* 풀 */
const GRASS_N = IS_TOUCH ? 550 : 1400;
const grassPts = scatter(GRASS_N, 2.0, 30, 2.2);
const grassMesh = new THREE.InstancedMesh(
  new THREE.ConeGeometry(0.32, 1.25, 4),
  new THREE.MeshLambertMaterial({ color:0x58b04e }), grassPts.length);
grassPts.forEach((p,i)=>{
  dummy.position.set(p.x, p.h+0.5, p.z);
  dummy.scale.set(0.7+hash(i,21)*0.8, 0.6+hash(i,23)*1.1, 0.7+hash(i,25)*0.8);
  dummy.rotation.set((hash(i,27)-0.5)*0.4, hash(i,29)*6.28, (hash(i,31)-0.5)*0.4);
  dummy.updateMatrix(); grassMesh.setMatrixAt(i, dummy.matrix);
  grassMesh.setColorAt(i, new THREE.Color().setHSL(0.29+hash(i,33)*0.08, 0.6, 0.32+hash(i,35)*0.18));
});
if(grassMesh.instanceColor) grassMesh.instanceColor.needsUpdate = true;
scene.add(grassMesh);

/* 꽃 */
const flowerPts = scatter(140, 2.0, 26, 2);
const flowerMesh = new THREE.InstancedMesh(new THREE.SphereGeometry(0.16,6,5), new THREE.MeshLambertMaterial({ color:0xffffff }), flowerPts.length);
const flowerColors = [0xff6b8a, 0xffd166, 0xa78bfa, 0xff8c5a, 0xffffff];
flowerPts.forEach((p,i)=>{
  dummy.position.set(p.x, p.h+0.35, p.z); dummy.scale.setScalar(0.8+hash(i,37)*0.7); dummy.rotation.set(0,0,0);
  dummy.updateMatrix(); flowerMesh.setMatrixAt(i, dummy.matrix);
  flowerMesh.setColorAt(i, new THREE.Color(flowerColors[i%flowerColors.length]));
});
if(flowerMesh.instanceColor) flowerMesh.instanceColor.needsUpdate = true;
scene.add(flowerMesh);

/* ================= 수정 ================= */
const crystalGlowTex = makeGlowTexture('rgba(200,160,255,0.95)','rgba(150,90,255,0.45)');
const crystals = [];
{
  const pts = scatter(20, 2.5, 60, 4);
  const geo = new THREE.OctahedronGeometry(1.1, 0);
  pts.forEach((p,i)=>{
    const m = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color:0xb07fff, emissive:0x7f3fff, emissiveIntensity:0.9, shininess:200, transparent:true, opacity:0.95 }));
    m.position.set(p.x, p.h+2, p.z);
    m.scale.y = 1.7;
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map:crystalGlowTex, transparent:true, depthWrite:false, opacity:0.85 }));
    glow.scale.set(7,7,1); m.add(glow);
    m.userData = { baseY:p.h+2, taken:false, phase:i };
    scene.add(m); crystals.push(m);
  });
}
const burstGeo = new THREE.BufferGeometry();
const BURST_N = 60;
burstGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(BURST_N*3),3));
const burst = new THREE.Points(burstGeo, new THREE.PointsMaterial({ color:0xcfa7ff, size:0.5, transparent:true, opacity:0, depthWrite:false }));
scene.add(burst);
let burstVel = null, burstLife = 0;

const fireGeo = new THREE.BufferGeometry();
const FIRE_N = 90, fireBase = new Float32Array(FIRE_N*3);
for(let i=0;i<FIRE_N;i++){ fireBase[i*3]=(Math.random()-0.5)*70; fireBase[i*3+1]=1+Math.random()*5; fireBase[i*3+2]=(Math.random()-0.5)*70; }
fireGeo.setAttribute('position', new THREE.BufferAttribute(fireBase.slice(),3));
const fireflies = new THREE.Points(fireGeo, new THREE.PointsMaterial({ color:0xaaffcc, size:0.35, transparent:true, opacity:0, depthWrite:false }));
scene.add(fireflies);

/* ================= 플레이어 + 검 & 방패 ================= */
const player = new THREE.Group();
{
  const skin = new THREE.MeshLambertMaterial({ color:0xffd9b3 });
  const cloth = new THREE.MeshLambertMaterial({ color:0x3f8cff });
  const pants = new THREE.MeshLambertMaterial({ color:0x2c3e60 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.55,1.15,10), cloth); body.position.y=1.35; player.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.42,12,10), skin); head.position.y=2.35; player.add(head);
  const hat = new THREE.Mesh(new THREE.ConeGeometry(0.5,0.55,10), new THREE.MeshLambertMaterial({ color:0xd8443c })); hat.position.y=2.85; player.add(hat);
  function limb(mat,x,y,legs){
    const g = new THREE.Group(); g.position.set(x,y,0);
    const m = new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.13,legs?0.85:0.75,7), mat);
    m.position.y = -(legs?0.42:0.37); g.add(m); player.add(g); return g;
  }
  player.userData.armL = limb(cloth,-0.62,1.85,false);
  player.userData.armR = limb(cloth, 0.62,1.85,false);
  player.userData.legL = limb(pants,-0.24,0.85,true);
  player.userData.legR = limb(pants, 0.24,0.85,true);
  /* 검 (오른손) */
  const sword = new THREE.Group();
  const metal = new THREE.MeshPhongMaterial({ color:0xdfe8f2, shininess:220, specular:0xffffff, emissive:0x223344, emissiveIntensity:0.25 });
  const gold = new THREE.MeshPhongMaterial({ color:0xd9a944, shininess:120 });
  const blade = new THREE.Mesh(new THREE.BoxGeometry(0.09,1.6,0.3), metal); blade.position.y=-1.1; sword.add(blade);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.16,0.35,4), metal); tip.rotation.x=Math.PI; tip.rotation.y=Math.PI/4; tip.position.y=-2.05; sword.add(tip);

let AC = null;
function initAudio(){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function tone(type,f0,f1,dur,vol,delay){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain(), t0=AC.currentTime+(delay||0);
  o.type=type; o.frequency.setValueAtTime(f0,t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t0+dur);
  g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+dur+0.02);
}
function noiseSfx(dur,vol,f0,f1){
  if(!AC) return;
  const n=Math.floor(AC.sampleRate*dur), buf=AC.createBuffer(1,n,AC.sampleRate), ch=buf.getChannelData(0);
  for(let i=0;i<n;i++) ch[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='bandpass'; const t0=AC.currentTime;
  f.frequency.setValueAtTime(f0,t0); f.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t0+dur);
  const g=AC.createGain(); g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  src.connect(f); f.connect(g); g.connect(AC.destination); src.start();
}
function sfx(k){
  if(!AC) return;
  if(k==='swing') noiseSfx(0.18,0.22,1600,300);
  else if(k==='hit'){ tone('square',160,55,0.12,0.3); noiseSfx(0.08,0.18,800,200); }
  else if(k==='hurt') tone('sawtooth',280,110,0.28,0.28);
  else if(k==='block'){ tone('square',950,620,0.07,0.18); noiseSfx(0.05,0.12,3000,1500); }
  else if(k==='pickup'){ tone('sine',660,660,0.09,0.2); tone('sine',990,990,0.13,0.2,0.09); }
  else if(k==='kill') tone('triangle',420,70,0.45,0.3);
  else if(k==='heal') tone('sine',520,820,0.2,0.18);
  else if(k==='jump') tone('sine',300,520,0.12,0.1);
  else if(k==='death') tone('sawtooth',220,40,1.0,0.3);
  else if(k==='win'){ tone('sine',523,523,0.15,0.2); tone('sine',659,659,0.15,0.2,0.15); tone('sine',784,784,0.3,0.22,0.3); }
}

const joy = { active:false, id:-1, x:0, y:0 };
let lookId=-1, lookX=0, lookY=0, touchJump=false;
const joyBase = document.getElementById('joyBase'), joyStick = document.getElementById('joyStick');

  const joyRect = ()=>joyBase.getBoundingClientRect();
  addEventListener('touchstart', e=>{
    for(const t of e.changedTouches){
      if(t.target && t.target.closest && t.target.closest('button')) continue;
      if(t.clientX < innerWidth*0.45 && t.clientY > innerHeight*0.4 && joy.id===-1){
        joy.id=t.identifier; joy.active=true;
      } else if(t.clientX >= innerWidth*0.45 && lookId===-1){
        lookId=t.identifier; lookX=t.clientX; lookY=t.clientY;
      }
    }
  }, {passive:true});
  addEventListener('touchmove', e=>{
    for(const t of e.changedTouches){
      if(t.identifier===joy.id){
        const r=joyRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
        let dx=t.clientX-cx, dy=t.clientY-cy;
        const len=Math.hypot(dx,dy), max=r.width/2;
        if(len>max){ dx=dx/len*max; dy=dy/len*max; }
        joy.x=dx/max; joy.y=dy/max;
        joyStick.style.transform=`translate(${dx}px,${dy}px)`;
      } else if(t.identifier===lookId){
        camYaw -= (t.clientX-lookX)*0.007;
        camPitch = Math.max(-0.1, Math.min(1.25, camPitch + (t.clientY-lookY)*0.005));
        lookX=t.clientX; lookY=t.clientY;
      }
    }
  }, {passive:true});
  addEventListener('touchend', e=>{
    for(const t of e.changedTouches){
      if(t.identifier===joy.id){ joy.id=-1; joy.active=false; joy.x=joy.y=0; joyStick.style.transform=''; }
      if(t.identifier===lookId) lookId=-1;
    }
  }, {passive:true});
}

function doAttack(){
  if(dead || attackT>0) return;
  attackT = 0.45; attackHit = false;
  player.rotation.y = Math.atan2(-Math.sin(camYaw), -Math.cos(camYaw));

function meleeHit(){
  const fx=Math.sin(player.rotation.y), fz=Math.cos(player.rotation.y);
  let hitAny=false;
  for(const m of mobs){
    if(m.dead || m.dying>=0) continue;
    const dx=m.mesh.position.x-player.position.x, dz=m.mesh.position.z-player.position.z;
    const d=Math.hypot(dx,dz);
    if(d<4.4 && (dx*fx+dz*fz)/Math.max(0.001,d) > 0.3){
      const dmg = Math.round(17+Math.random()*9);
      m.hp -= dmg; drawBar(m);
      showDmg(m.mesh.position, String(dmg), '#ffe07a');
      m.hitT = 0.16;
      for(const f of m.flashMats) f.mat.emissive.setHex(0xff2222);
      /* 넉백 */
      const kb = m.type==='golem' ? 0.8 : 2.2;
      m.mesh.position.x += dx/Math.max(0.001,d)*kb;
      m.mesh.position.z += dz/Math.max(0.001,d)*kb;
      hitAny=true;
      if(m.hp<=0){
        m.dying = 0.6; m.bar.sp.visible=false;
        kills++; killEl.textContent = `⚔️ 처치 ${kills}`;
        sfx('kill');
        if(Math.random()<0.45) dropOrb(m.mesh.position);
      }
    }
  }
  if(hitAny) sfx('hit');
}
function damagePlayer(dmg, m){
  if(dead) return;
  const isBlocking = blocking||blockKey;
  let blocked=false;
  if(isBlocking){
    const fx=Math.sin(player.rotation.y), fz=Math.cos(player.rotation.y);
    const dx=m.mesh.position.x-player.position.x, dz=m.mesh.position.z-player.position.z;
    const d=Math.max(0.001,Math.hypot(dx,dz));
    if((dx*fx+dz*fz)/d > 0.1) blocked=true;
  }
  const final = Math.round(blocked ? dmg*0.15 : dmg);
  hp -= final; lastHurt = performance.now()/1000;
  updateHpUI();
  showDmg(player.position, String(final), blocked ? '#9ecbff' : '#ff7a6a');
  if(blocked){ sfx('block'); }
  else { sfx('hurt'); flashVig(); shake = 0.3; }
  /* 밀려남 */
  const dx=player.position.x-m.mesh.position.x, dz=player.position.z-m.mesh.position.z;
  const d=Math.max(0.001,Math.hypot(dx,dz));
  player.position.x += dx/d*(blocked?0.6:1.6);
  player.position.z += dz/d*(blocked?0.6:1.6);
  if(hp<=0){
    dead=true; hp=0; updateHpUI(); sfx('death');
    const ov = document.getElementById('deathOverlay'); ov.style.display='flex';
    setTimeout(()=>{
      player.position.set(spawn.x, terrainH(spawn.x,spawn.z), spawn.z);
      hp=100; updateHpUI(); dead=false; vy=0;
      ov.style.display='none';
    }, 2600);
  }
}

const dayC = new THREE.Color(0x87c5ec), duskC = new THREE.Color(0xff9a5c), nightC = new THREE.Color(0x0a1226);
const fogDayC = new THREE.Color(0xa8d4f0), fogNightC = new THREE.Color(0x0c1530);
const skyTmp = new THREE.Color(), fogTmp = new THREE.Color();
let prev = performance.now(), fpsN=0, fpsT=0;

function animate(now){
  requestAnimationFrame(animate);
  let dt = Math.min(0.05, (now-prev)/1000); prev = now;
  const t = now/1000;

  /* --- 낮/밤 --- */
  timeOfDay = (timeOfDay + dt/DAY_LENGTH) % 1;
  const ang = timeOfDay*Math.PI*2 - Math.PI/2;
  const sunH = Math.sin(ang);
  const dayF = THREE.MathUtils.clamp(sunH*2.2+0.15, 0, 1);
  const duskF = Math.max(0, 1-Math.abs(sunH)*3.5);
  skyTmp.copy(nightC).lerp(dayC, dayF).lerp(duskC, duskF*0.55);
  fogTmp.copy(fogNightC).lerp(fogDayC, dayF).lerp(duskC, duskF*0.3);
  scene.background = skyTmp;
  scene.fog.color.copy(fogTmp);
  sun.intensity = dayF*1.15;
  moon.intensity = (1-dayF)*0.3;
  hemi.intensity = 0.18 + dayF*0.55;
  starMat.opacity = Math.max(0, 1-dayF*2.2);
  fireflies.material.opacity = Math.max(0, 1-dayF*2)*0.9;

  const sunDir = new THREE.Vector3(Math.cos(ang), Math.sin(ang), 0.35).normalize();
  sun.position.copy(player.position).addScaledVector(sunDir, 300);
  sun.target.position.copy(player.position);
  moon.position.copy(player.position).addScaledVector(sunDir, -300);
  moon.target.position.copy(player.position);
  sunSprite.position.copy(camera.position).addScaledVector(sunDir, 1400);
  moonSprite.position.copy(camera.position).addScaledVector(sunDir, -1400);
  sunSprite.material.opacity = THREE.MathUtils.clamp(sunH*4+0.5,0,1);
  moonSprite.material.opacity = THREE.MathUtils.clamp(-sunH*4+0.5,0,1);

  const hourNames = [['🌙 깊은 밤',0],['🌅 새벽',0.18],['☀️ 아침',0.24],['☀️ 한낮',0.35],['🌇 저녁',0.62],['🌙 밤',0.72]];
  let label = hourNames[0][0];
  for(const [nm, th] of hourNames) if(timeOfDay >= th) label = nm;
  clockEl.textContent = label;

  /* --- 이동 --- */
  const isBlocking = blocking||blockKey;
  let mx=0, mz=0;
  if(!dead){
    if(keys['KeyW']||keys['ArrowUp']) mz-=1;
    if(keys['KeyS']||keys['ArrowDown']) mz+=1;
    if(keys['KeyA']||keys['ArrowLeft']) mx-=1;
    if(keys['KeyD']||keys['ArrowRight']) mx+=1;
    if(joy.active){ mx += joy.x; mz += joy.y; }
  }
  const mlen = Math.hypot(mx,mz);
  const sprint = keys['ShiftLeft']||keys['ShiftRight'] || mlen>0.92;
  let speed = sprint ? 17 : 10;
  if(isBlocking) speed *= 0.45;
  if(mlen>0.01){
    const nx = mx/Math.max(1,mlen), nz = mz/Math.max(1,mlen);
    const sin=Math.sin(camYaw), cos=Math.cos(camYaw);
    const wx = nx*cos + nz*sin, wz = -nx*sin + nz*cos;
    player.position.x += wx*speed*dt*Math.min(1,mlen);
    player.position.z += wz*speed*dt*Math.min(1,mlen);
    if(attackT<=0) player.rotation.y = Math.atan2(wx, wz);
    const sw = Math.sin(t*(sprint?13:9))*0.7;
    player.userData.armL.rotation.x =  sw; player.userData.armR.rotation.x = -sw;
    player.userData.legL.rotation.x = -sw; player.userData.legR.rotation.x =  sw;
  } else {
    ['armL','armR','legL','legR'].forEach(k=>{ player.userData[k].rotation.x *= 0.8; });
  }
  /* 공격 애니메이션 (오른팔 오버라이드) */
  if(attackT>0){
    attackT -= dt;
    const k = 1-Math.max(0,attackT)/0.45;
    const swing = k<0.3 ? 0.9*(k/0.3) : 0.9 - 3.3*((k-0.3)/0.7);
    player.userData.armR.rotation.x = swing;
    if(!attackHit && k>0.45){ attackHit=true; meleeHit(); }
  }
  /* 방패 올리기 (왼팔 오버라이드) */
  if(isBlocking && !dead){
    player.userData.armL.rotation.x += (-1.45 - player.userData.armL.rotation.x)*Math.min(1,dt*14);
  }
  /* 경계 */
  const bd = Math.hypot(player.position.x, player.position.z);
  if(bd > WORLD*0.47){ const s = WORLD*0.47/bd; player.position.x*=s; player.position.z*=s; }

  /* 중력/점프 */
  const ground = Math.max(terrainH(player.position.x, player.position.z), WATER_Y-0.6);
  if(!dead && (keys['Space']||touchJump) && onGround){ vy = 13; onGround = false; sfx('jump'); }
  vy -= 32*dt;
  player.position.y += vy*dt;
  if(player.position.y <= ground){ player.position.y = ground; vy = 0; onGround = true; }

  /* HP 재생 */
  if(!dead && t - lastHurt > 6 && hp < 100){ hp = Math.min(100, hp + 4*dt); updateHpUI(); }

  /* --- 카메라 --- */
  const cp = camPitch, cy = camYaw;
  const cx = player.position.x + Math.sin(cy)*Math.cos(cp)*camDist;
  const cz = player.position.z + Math.cos(cy)*Math.cos(cp)*camDist;
  let cyy = player.position.y + 2 + Math.sin(cp)*camDist;
  cyy = Math.max(cyy, terrainH(cx,cz)+1.2, WATER_Y+1.2);
  camera.position.lerp(new THREE.Vector3(cx,cyy,cz), Math.min(1, dt*8));
  camera.lookAt(player.position.x, player.position.y+2.2, player.position.z);
  if(shake>0){
    shake -= dt;
    camera.position.x += (Math.random()-0.5)*shake*1.6;
    camera.position.y += (Math.random()-0.5)*shake*1.6;
  }

  /* --- 몹 AI --- */
  for(const m of mobs){
    if(m.dead){
      if(t > m.respawnAt){
        m.dead=false; m.hp=m.maxHp; drawBar(m);
        m.mesh.visible=true; m.mesh.scale.setScalar(1);
        m.mesh.position.set(m.home.x, terrainH(m.home.x,m.home.z), m.home.z);
      }
      continue;
    }
    if(m.dying>=0){
      m.dying -= dt;
      m.mesh.scale.multiplyScalar(Math.max(0.01, 1-dt*3));
      m.mesh.rotation.y += dt*9;
      if(m.dying<=0){ m.dying=-1; m.dead=true; m.mesh.visible=false; m.respawnAt=t+22; m.mesh.rotation.y=0; }
      continue;
    }
    if(m.hitT>0){
      m.hitT -= dt;
      if(m.hitT<=0) for(const f of m.flashMats) f.mat.emissive.setHex(f.base);
    }
    const dx = player.position.x - m.mesh.position.x;
    const dz = player.position.z - m.mesh.position.z;
    const dist = Math.hypot(dx,dz);
    let moveX=0, moveZ=0, moving=false;
    if(!dead && dist < m.detect && dist > 0.1){
      /* 추격 */
      if(dist > m.range){
        moveX = dx/dist*m.speed*dt; moveZ = dz/dist*m.speed*dt; moving=true;
      } else if(t > m.atkNext){
        m.atkNext = t + m.atkCd;
        m.lungeT = 0.28;
        damagePlayer(m.dmg, m);
      }
      m.mesh.rotation.y += (Math.atan2(dx,dz) - m.mesh.rotation.y)*Math.min(1,dt*8);
    } else {
      /* 배회 */
      m.wT -= dt;
      if(m.wT<=0){ m.wT = 2.5+Math.random()*3; m.wDir = Math.random()*6.28; m.wMove = Math.random()<0.6; }
      if(m.wMove){
        moveX = Math.sin(m.wDir)*m.speed*0.32*dt; moveZ = Math.cos(m.wDir)*m.speed*0.32*dt; moving=true;
        m.mesh.rotation.y += (m.wDir - m.mesh.rotation.y)*Math.min(1,dt*4);
        if(Math.hypot(m.mesh.position.x+moveX-m.home.x, m.mesh.position.z+moveZ-m.home.z) > 45){ m.wDir += Math.PI; }
      }
    }
    if(moving){
      const nx = m.mesh.position.x+moveX, nz = m.mesh.position.z+moveZ;
      if(terrainH(nx,nz) > 1.0){ m.mesh.position.x=nx; m.mesh.position.z=nz; }
    }
    /* 지형 부착 + 타입별 애니메이션 */
    const gh = terrainH(m.mesh.position.x, m.mesh.position.z);
    if(m.type==='slime'){
      const hop = Math.abs(Math.sin(t*6+m.phase)) * (moving?1.1:0.35);
      m.mesh.position.y = gh + hop;
      const sq = 1 - Math.abs(Math.cos(t*6+m.phase))*0.18;
      m.mesh.userData.bodyMesh.scale.set(1/Math.sqrt(sq), 0.82*sq, 1/Math.sqrt(sq));
    } else {
      m.mesh.position.y = gh + (moving ? Math.abs(Math.sin(t*7+m.phase))*0.15 : 0);
    }
    /* 돌진 애니메이션 */
    if(m.lungeT>0){
      m.lungeT -= dt;
      const l = m.lungeT/0.28;
      m.mesh.position.x += Math.sin(m.mesh.rotation.y)*l*6*dt;
      m.mesh.position.z += Math.cos(m.mesh.rotation.y)*l*6*dt;
    }
    /* 헬스바 */
    m.bar.sp.visible = m.hp < m.maxHp && dist < 55;
  }

  /* --- 회복 오브 --- */
  for(let i=orbs.length-1;i>=0;i--){
    const o = orbs[i];
    o.mesh.rotation.y += dt*3;
    o.mesh.position.y = o.baseY + Math.sin(t*3+i)*0.25;
    if(!dead && o.mesh.position.distanceTo(player.position) < 2.4){
      hp = Math.min(100, hp+25); updateHpUI();
      showDmg(player.position, '+25', '#7aff8a'); sfx('heal');
      scene.remove(o.mesh); orbs.splice(i,1);
    } else if(t > o.until){
      scene.remove(o.mesh); orbs.splice(i,1);
    }
  }

  /* --- 데미지 숫자 --- */
  for(const d of dmgPool){
    if(d.life<=0) continue;
    d.life -= dt;
    d.sp.position.y += dt*2.4;
    d.sp.material.opacity = Math.max(0, d.life);
    if(d.life<=0) d.sp.visible=false;
  }

  /* --- 물/구름 --- */
  water.position.x = player.position.x; water.position.z = player.position.z;
  for(let i=0;i<waterPos.count;i++){
    const bx = waterBase[i*3], bz = waterBase[i*3+2];
    waterPos.setY(i, Math.sin(bx*0.05 + t*1.4) * Math.cos(bz*0.06 + t*1.1) * 0.5);
  }
  waterPos.needsUpdate = true;
  for(const c of clouds){
    c.position.x += c.userData.v*dt;
    if(c.position.x > WORLD*0.9) c.position.x = -WORLD*0.9;
  }

  /* --- 수정 수집 --- */
  for(const c of crystals){
    if(c.userData.taken) continue;
    c.rotation.y += dt*1.5;
    c.position.y = c.userData.baseY + Math.sin(t*2 + c.userData.phase)*0.4;
    if(!dead && c.position.distanceTo(player.position) < 3){
      c.userData.taken = true; c.visible = false; collected++;
      countEl.textContent = `💎 ${collected} / 20`;
      sfx('pickup');
      if(collected<20) toast(`수정 획득! ${20-collected}개 남음`);
      const bp = burstGeo.attributes.position; burstVel = [];
      for(let i=0;i<BURST_N;i++){
        bp.setXYZ(i, c.position.x, c.position.y, c.position.z);
        const th=Math.random()*6.28, ph=Math.random()*3.14;
        burstVel.push(new THREE.Vector3(Math.sin(ph)*Math.cos(th), Math.cos(ph)+0.8, Math.sin(ph)*Math.sin(th)).multiplyScalar(3+Math.random()*5));
      }
      bp.needsUpdate = true; burstLife = 1; burst.material.opacity = 1;
      if(collected===20 && !won){
        won = true; sfx('win');
        const secs = Math.round((performance.now()-startTime)/1000);
        document.getElementById('winTime').textContent = `클리어 시간: ${Math.floor(secs/60)}분 ${secs%60}초 · 처치 ${kills} — 계속 자유롭게 탐험할 수 있습니다`;
        const w = document.getElementById('winOverlay'); w.style.display='flex';
        setTimeout(()=>w.style.display='none', 6000);
      }
    }
  }
  if(burstLife > 0){
    burstLife -= dt*0.9;
    const bp = burstGeo.attributes.position;
    for(let i=0;i<BURST_N;i++){
      bp.setXYZ(i, bp.getX(i)+burstVel[i].x*dt, bp.getY(i)+burstVel[i].y*dt, bp.getZ(i)+burstVel[i].z*dt);
      burstVel[i].y -= 6*dt;
    }
    bp.needsUpdate = true;
    burst.material.opacity = Math.max(0, burstLife);
  }

  /* --- 반딧불 --- */
  if(fireflies.material.opacity > 0.01){
    const fp = fireGeo.attributes.position;
    for(let i=0;i<FIRE_N;i++){
      fp.setXYZ(i,
        player.position.x + fireBase[i*3] + Math.sin(t*0.7+i)*3,
        Math.max(terrainH(player.position.x+fireBase[i*3], player.position.z+fireBase[i*3+2]), WATER_Y) + fireBase[i*3+1] + Math.sin(t*1.3+i*2)*1.2,
        player.position.z + fireBase[i*3+2] + Math.cos(t*0.6+i)*3);
    }
    fp.needsUpdate = true;
  }

  fpsN++; fpsT += dt;
  if(fpsT >= 0.5){ fpsEl.textContent = Math.round(fpsN/fpsT) + ' FPS'; fpsN=0; fpsT=0; }

  renderer.render(scene, camera);
}
updateHpUI();
requestAnimationFrame(animate);
</script>
</body>
</html>
